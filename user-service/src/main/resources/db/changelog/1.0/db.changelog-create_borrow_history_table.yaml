databaseChangeLog:
  - changeSet:
      id: 09072026
      author: Memmed Suleyman
      changes:
        - createTable:
            tableName: borrow_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: book_title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: borrowed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: returned_at
                  type: TIMESTAMP
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: borrow_history
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_borrow_history_users
