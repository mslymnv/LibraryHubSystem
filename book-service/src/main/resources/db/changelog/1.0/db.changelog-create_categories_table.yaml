databaseChangeLog:
  - changeSet:
      id: 07012026
      author: Memmed Suleyman
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
