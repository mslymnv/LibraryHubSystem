databaseChangeLog:
  - changeSet:
      id: 07012026
      author: Memmed Suleyman
      changes:
        - createTable:
            tableName: borrows
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: borrowed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: due_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: returned_at
                  type: TIMESTAMP

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_borrows_books
                    references: books(id)
