databaseChangeLog:
  - changeSet:
      id: 07012026
      author: Memmed Suleyman
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: author
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: isbn
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true


              - column:
                  name: description
                  type: VARCHAR(1000)

              - column:
                  name: total_copies
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: available_copies
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: published_year
                  type: integer

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_books_category
                    references: categories(id)

